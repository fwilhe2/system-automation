lima:
  hosts:
    fedora-vm:
      ansible_host: 127.0.0.1
      ansible_port: 60033
      ansible_user: "{{ lookup('env', 'USER') }}"
      ansible_ssh_private_key_file: "~/.lima/_config/user"
      ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
    debian-vm:
      ansible_host: 127.0.0.1
      ansible_port: 60044
      ansible_user: "{{ lookup('env', 'USER') }}"
      ansible_ssh_private_key_file: "~/.lima/_config/user"
      ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
